name: Build Android APK

on:
  push:
    branches: [ "main", "codex/nexus-command-orchestrator" ]
    paths:
      - 'mobile-apk/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download and setup Gradle 8.6
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
        unzip -q gradle-8.6-bin.zip -d /opt/gradle
        echo "/opt/gradle/gradle-8.6/bin" >> $GITHUB_PATH

    - name: Build APK
      run: gradle assembleDebug --no-daemon --stacktrace
      working-directory: mobile-apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NexusMobile-APK
        path: mobile-apk/app/build/outputs/apk/debug/app-debug.apk
