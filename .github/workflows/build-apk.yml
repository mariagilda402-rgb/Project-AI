name: Build Android APK

on:
  push:
    branches: [ "main", "codex/nexus-command-orchestrator" ]
    paths:
      - 'mobile-apk/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: mobile-apk

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: mobile-apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NexusMobile-APK
        path: mobile-apk/app/build/outputs/apk/debug/app-debug.apk
