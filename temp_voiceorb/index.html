<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Orb - Proof of Concept</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Theme Toggle -->
    <div id="themeToggle" class="theme-toggle">
        <button id="themeBtn" class="theme-btn" aria-label="Toggle theme">
            <span class="sun-icon">☀️</span>
            <span class="moon-icon">🌙</span>
        </button>
    </div>
    
    <div id="container">
        <canvas id="canvas"></canvas>
        <div id="controls">
            <button id="startBtn">Start Voice Mode</button>
            <div id="status">Click to enable microphone</div>
            
            <div id="stateControls">
                <div class="state-buttons">
                    <button class="state-btn active" data-state="idle">
                        <span class="icon">🔇</span>
                        <span>Muted</span>
                    </button>
                    <button class="state-btn" data-state="listening">
                        <span class="icon">👂</span>
                        <span>Listening</span>
                    </button>
                    <button class="state-btn" data-state="thinking">
                        <span class="icon">🤔</span>
                        <span>Thinking</span>
                    </button>
                    <button class="state-btn" data-state="speaking">
                        <span class="icon">💬</span>
                        <span>Speaking</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
