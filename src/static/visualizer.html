<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Energy Orb - Assistente IA</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        #ui { position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center; pointer-events: none; }
        #subtitle { font-size: 26px; text-shadow: 0 0 15px rgba(0, 150, 255, 0.8); max-width: 900px; margin: 0 auto; line-height: 1.4; }
        #start-btn { position: absolute; top: 20px; right: 20px; padding: 10px 20px; background: rgba(0, 150, 255, 0.2); border: 1px solid #0096ff; color: #fff; cursor: pointer; border-radius: 5px; pointer-events: auto; transition: 0.3s; }
        #start-btn:hover { background: rgba(0, 150, 255, 0.4); }
        #status-indicator { position: absolute; top: 25px; left: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
    <div id="status-indicator">ASSISTENTE IA</div>
    <button id="start-btn">Ativar Áudio (Voz)</button>
    <div id="ui"><div id="subtitle"></div></div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js';

        // --- Shaders ---
        const vertexShader = `
#define NUM_OCTAVES 3
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
float snoise(vec3 v){
  const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
  const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i  = floor(v + dot(v, C.yyy) );
  vec3 x0 = v - i + dot(i, C.xxx) ;
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min( g.xyz, l.zxy );
  vec3 i2 = max( g.xyz, l.zxy );
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;
  i = mod(i, 289.0 );
  vec4 p = permute( permute( permute( i.z + vec4(0.0, i1.z, i2.z, 1.0 )) + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
  float n_ = 0.142857142857;
  vec3  ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_ );
  vec4 x = x_ *ns.x + ns.yyyy;
  vec4 y = y_ *ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4( x.xy, y.xy );
  vec4 b1 = vec4( x.zw, y.zw );
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
  vec3 p0 = vec3(a0.xy,h.x);
  vec3 p1 = vec3(a0.zw,h.y);
  vec3 p2 = vec3(a1.xy,h.z);
  vec3 p3 = vec3(a1.zw,h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
}
float fbm(vec3 x) {
    float v = 0.0;
    float a = 0.5;
    vec3 shift = vec3(100);
    for (int i = 0; i < NUM_OCTAVES; ++i) {
        v += a * snoise(x);
        x = x * 2.0 + shift;
        a *= 0.5;
    }
    return v;
}

uniform float u_time;
uniform float u_amplitude;
uniform float u_speed;
uniform float u_distortion;

varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vPosition;
varying float vNoise;

void main() {
    vUv = uv;
    vNormal = normal;
    
    // Deformação suave
    vec3 noisePos = position * 1.2 + u_time * u_speed;
    float n = fbm(noisePos);
    n = smoothstep(-1.0, 1.0, n) * 2.0 - 1.0;
    vNoise = n;
    
    vec3 pos = position;
    float deformation = n * (u_distortion + u_amplitude * 0.8);
    pos += normal * deformation;
    
    vPosition = pos;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    
    // Tamanho do ponto (caso use THREE.Points)
    gl_PointSize = 2.0;
}
`;

        const fragmentShader = `
uniform float u_time;
uniform vec3 u_color1;
uniform vec3 u_color2;
uniform vec3 u_color3;
uniform float u_fresnelIntensity;
uniform float u_stateMix;
uniform float u_opacity;

varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vPosition;
varying float vNoise;

void main() {
    // Cores base escuras
    vec3 color = mix(u_color1, u_color2, vNoise * 0.5 + 0.5);
    
    // Mistura sutil
    float mix3 = sin(vPosition.y * 3.0 + u_time * 2.0) * 0.5 + 0.5;
    color = mix(color, u_color3, mix3 * 0.3);
    
    // Fresnel / Rim lighting (Apenas as bordas brilham forte)
    vec3 viewDirection = normalize(cameraPosition - vPosition);
    float fresnel = dot(viewDirection, normalize(vNormal));
    fresnel = clamp(1.0 - fresnel, 0.0, 1.0);
    fresnel = pow(fresnel, 3.0); // Reduzido de 4.0 para 3.0 para suavizar
    
    // Adiciona brilho nas bordas sem estourar o branco
    color += u_color3 * fresnel * u_fresnelIntensity;
    
    // Efeito para "Searching"
    if (u_stateMix > 0.0) {
        float scanline = sin(vPosition.y * 15.0 - u_time * 8.0);
        scanline = smoothstep(0.95, 1.0, scanline);
        color += vec3(0.0, 1.0, 1.0) * scanline * u_stateMix;
    }
    
    gl_FragColor = vec4(color, u_opacity);
}
`;

        // --- Setup Three.js ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 4.0;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        
        // --- Pós-processamento: Trails e Bloom ---
        const renderScene = new RenderPass(scene, camera);
        
        const afterimagePass = new AfterimagePass();
        afterimagePass.uniforms['damp'].value = 0.65; // Reduzido para evitar que o rastro acumule e vire um borrão branco
        
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 0.8; // Reduzido o glow global
        bloomPass.radius = 0.5;
        
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(afterimagePass);
        composer.addPass(bloomPass);

        // Usar IcosahedronGeometry evita o efeito "globo achatado nos polos" e cria uma rede contínua de triângulos
        const geometry = new THREE.IcosahedronGeometry(1.5, 48);
        
        const baseUniforms = {
            u_time: { value: 0 },
            u_amplitude: { value: 0 },
            u_speed: { value: 0.2 },
            u_distortion: { value: 0.15 },
            u_color1: { value: new THREE.Color(0x000522) },
            u_color2: { value: new THREE.Color(0x0022ff) },
            u_color3: { value: new THREE.Color(0x00ffff) },
            u_fresnelIntensity: { value: 1.5 }, // Reduzido de 2.0 para evitar clarão
            u_stateMix: { value: 0.0 }
        };
        
        // Camada Única: Wireframe externo contínuo
        const outerMaterial = new THREE.ShaderMaterial({
            vertexShader, fragmentShader,
            uniforms: { ...baseUniforms, u_opacity: { value: 0.25 } }, // Ajuste fino da opacidade das linhas
            wireframe: true,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const outerSphere = new THREE.Mesh(geometry, outerMaterial);
        scene.add(outerSphere);

        // Pontos flutuantes foram REMOVIDOS para focar apenas nas linhas conectadas!


        // --- Analise de Audio ---
        let audioContext, micAnalyser, ttsAnalyser, dataArray;
        let isAudioActive = false;
        let currentAudioFile = "";

        document.getElementById('start-btn').addEventListener('click', async () => {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                micAnalyser = audioContext.createAnalyser();
                micAnalyser.fftSize = 256;
                
                ttsAnalyser = audioContext.createAnalyser();
                ttsAnalyser.fftSize = 256;
                ttsAnalyser.connect(audioContext.destination);
                
                dataArray = new Uint8Array(micAnalyser.frequencyBinCount);
                isAudioActive = true;
                document.getElementById('start-btn').style.display = 'none';
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(micAnalyser);
            } catch (e) {
                console.error("Audio error: ", e);
                alert("Falha ao acessar o microfone. A reatividade à voz da IA continuará funcionando se houver áudio.");
                isAudioActive = true;
                document.getElementById('start-btn').style.display = 'none';
            }
        });

        // --- Gestão de Estados ---
        let currentState = 'idle';
        let lastSub = '';

        const STATES = {
            idle: {
                speed: 0.1, distortion: 0.08,
                color1: 0x000522, color2: 0x0022ff, color3: 0x00ffff,
                fresnel: 1.5, stateMix: 0.0
            },
            speaking: {
                speed: 0.35, distortion: 0.20,
                color1: 0x440055, color2: 0xff00aa, color3: 0xff88ff,
                fresnel: 1.8, stateMix: 0.0
            },
            thinking: {
                speed: 0.6, distortion: 0.3,
                color1: 0x110033, color2: 0x8800ff, color3: 0xaa55ff,
                fresnel: 1.2, stateMix: 0.0
            },
            searching: {
                speed: 0.25, distortion: 0.1,
                color1: 0x002233, color2: 0x0088ff, color3: 0x55ffff,
                fresnel: 1.8, stateMix: 1.0
            }
        };

        async function playAudioFromServer() {
            if(!audioContext) return;
            try {
                const res = await fetch('/api/audio?t=' + Date.now());
                const arrayBuffer = await res.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(ttsAnalyser);
                
                source.onended = () => {
                    fetch('/api/audio_finished', { method: 'POST' });
                    currentAudioFile = ""; // Permite tocar novamente se vier o mesmo nome
                };
                source.start(0);
            } catch(e) {
                console.error("Erro ao tocar audio TTS", e);
                fetch('/api/audio_finished', { method: 'POST' });
            }
        }

        // Polling do backend Python
        async function pollState() {
            try {
                const res = await fetch('/api/state');
                if (res.ok) {
                    const data = await res.json();
                    if(data.status && STATES[data.status]) currentState = data.status;
                    if(data.subtitle !== lastSub) {
                        lastSub = data.subtitle;
                        document.getElementById('subtitle').textContent = data.subtitle;
                    }
                    if(data.audio_ready && data.audio_file && data.audio_file !== currentAudioFile) {
                        currentAudioFile = data.audio_file;
                        if (!audioContext) {
                            fetch('/api/audio_finished', { method: 'POST' });
                        } else {
                            playAudioFromServer();
                        }
                    }
                }
            } catch(e) {}
        }
        setInterval(pollState, 150);

        // --- Loop de Animacao ---
        const clock = new THREE.Clock();

        function updateUniforms(targetMat, targetState, audioAmp, time) {
            targetMat.uniforms.u_speed.value += (targetState.speed - targetMat.uniforms.u_speed.value) * 0.05;
            targetMat.uniforms.u_distortion.value += (targetState.distortion - targetMat.uniforms.u_distortion.value) * 0.05;
            targetMat.uniforms.u_fresnelIntensity.value += (targetState.fresnel - targetMat.uniforms.u_fresnelIntensity.value) * 0.05;
            targetMat.uniforms.u_stateMix.value += (targetState.stateMix - targetMat.uniforms.u_stateMix.value) * 0.05;
            
            targetMat.uniforms.u_color1.value.lerp(new THREE.Color(targetState.color1), 0.05);
            targetMat.uniforms.u_color2.value.lerp(new THREE.Color(targetState.color2), 0.05);
            targetMat.uniforms.u_color3.value.lerp(new THREE.Color(targetState.color3), 0.05);
            
            targetMat.uniforms.u_amplitude.value += (audioAmp - targetMat.uniforms.u_amplitude.value) * 0.2;
            targetMat.uniforms.u_time.value = time;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            
            const targetState = STATES[currentState] || STATES.idle;
            
            let audioAmp = 0;
            if (isAudioActive) {
                if (currentState === 'speaking' && ttsAnalyser) {
                    ttsAnalyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                    audioAmp = (sum / dataArray.length) / 255.0;
                    audioAmp *= 1.5; // Amplifica o visualizer da voz do assistente
                } else if (micAnalyser) {
                    micAnalyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                    audioAmp = (sum / dataArray.length) / 255.0;
                }
            }
            
            updateUniforms(outerMaterial, targetState, audioAmp, time);
            
            // Movimentos independentes para criar as camadas flutuantes
            outerSphere.rotation.y = time * 0.1;
            outerSphere.rotation.x = time * 0.05;
            
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
