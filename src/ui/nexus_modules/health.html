<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus · Saúde Física</title>
  <style>
    @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    
    #nx-app-wrapper .nx-chrome-inner > header {
      padding:14px 24px !important;
      background: linear-gradient(90deg, rgba(239,68,68,0.15), rgba(245,158,11,0.08)), var(--bg-panel) !important;
    }
    #nx-app-wrapper .nx-chrome-inner > header h1 { font-size:18px !important; font-weight:800 !important; color:#f87171 !important; }
    #nx-app-wrapper .nx-chrome-inner > main { padding:20px 24px 40px !important; }

    .health-grid { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:16px; margin-bottom:20px; }
    
    .card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:16px; transition:transform 0.2s cubic-bezier(0.2,0.8,0.2,1); backdrop-filter:blur(10px); }
    .card:hover { transform:translateY(-2px); border-color:rgba(248,113,113,0.3); box-shadow:0 10px 25px rgba(0,0,0,0.2); }
    .card-title { font-size:12px; font-weight:800; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; display:flex; justify-content:space-between; }
    
    .metric-hero { font-size:28px; font-weight:900; color:var(--text); margin-bottom:4px; }
    .metric-hero span { font-size:14px; color:var(--text-dim); font-weight:600; }
    
    .row-item { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; animation:slideIn 0.3s ease; }
    .row-info strong { display:block; font-size:13px; color:var(--text); }
    .row-info small { color:var(--text-dim); font-size:11px; }
    .row-badge { background:rgba(239,68,68,0.1); color:#f87171; padding:4px 8px; border-radius:6px; font-size:11px; font-weight:700; border:1px solid rgba(239,68,68,0.2); }

    .btn-record { width:100%; padding:10px; background:linear-gradient(135deg, #ef4444, #f59e0b); color:#fff; border:none; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; margin-top:10px; transition:all 0.2s; box-shadow:0 4px 14px rgba(239,68,68,0.3); }
    .btn-record:hover { filter:brightness(1.1); transform:translateY(-1px); }

    @media (max-width: 760px) { .health-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <div><h1>💪 Saúde Física</h1><span>Rastreamento de treinos e alimentação</span></div>
    <div style="display:flex; gap:8px; align-items:center;">
      <button type="button" class="btn btn-ghost" onclick="pywebview.api.jump('overview','{}')">Voltar</button>
    </div>
  </header>
  <main>
    <div class="health-grid">
      <div class="card">
        <div class="card-title">Métricas Corporais</div>
        <div style="display:flex; gap:20px; margin-bottom:12px;">
          <div>
            <div class="metric-hero" id="mWeight">-- <span>kg</span></div>
            <small style="color:var(--text-dim)">Peso Atual</small>
          </div>
          <div>
            <div class="metric-hero" id="mBF">-- <span>%</span></div>
            <small style="color:var(--text-dim)">Gordura (BF)</small>
          </div>
        </div>
        <div style="display:flex; gap:20px;">
          <div>
            <div class="metric-hero" style="font-size:20px;" id="mCals">-- <span>kcal</span></div>
            <small style="color:var(--text-dim)">Calorias Hoje</small>
          </div>
          <div>
            <div class="metric-hero" style="font-size:20px;" id="mProt">-- <span>g</span></div>
            <small style="color:var(--text-dim)">Proteína Hoje</small>
          </div>
        </div>
        <button class="btn-record" onclick="askAgent('Registre minhas medidas')">Nova Medição c/ IA</button>
      </div>

      <div class="card">
        <div class="card-title">Últimos Treinos</div>
        <div id="workoutList">
          <div style="padding:20px; text-align:center; color:var(--text-dim); font-size:12px;">Carregando...</div>
        </div>
        <button class="btn-record" onclick="askAgent('Adicione um treino agora mesmo')">Registrar Treino c/ IA</button>
      </div>
    </div>
  </main>

  <script src="nexus_boot.js"></script>
  <script>
    const boot = readBoot();

    async function loadData() {
      const [m, w] = await Promise.all([
        nxBridge('health_metrics_get', {}),
        nxBridge('health_workouts_list', {})
      ]);

      if (m.ok && m.data.latest) {
        document.getElementById('mWeight').innerHTML = (m.data.latest.weight || '--') + ' <span>kg</span>';
        document.getElementById('mBF').innerHTML = (m.data.latest.body_fat_percentage || '--') + ' <span>%</span>';
        document.getElementById('mCals').innerHTML = (m.data.latest.calories_consumed || '--') + ' <span>kcal</span>';
        document.getElementById('mProt').innerHTML = (m.data.latest.protein_grams || '--') + ' <span>g</span>';
      }

      if (w.ok) {
        const list = document.getElementById('workoutList');
        if (!w.data || w.data.length === 0) {
          list.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-dim); font-size:12px;">Nenhum treino registrado. Peça ao Jarvis para adicionar.</div>';
        } else {
          list.innerHTML = w.data.slice(0, 4).map(wk => {
            return `
              <div class="row-item">
                <div class="row-info">
                  <strong>${wk.type}</strong>
                  <small>${wk.date} • ${wk.duration_minutes} min</small>
                </div>
                <div class="row-badge">${wk.calories_burned} kcal</div>
              </div>
            `;
          }).join('');
        }
      }
    }

    function askAgent(cmd) {
      if(window.pywebview && window.pywebview.api) {
          window.pywebview.api.agent_chat(cmd);
          showToastBanner({type:'info', msg: 'Aguardando o agente responder...'});
      }
    }

    loadData();
    window.addEventListener('message', (e) => {
      if (e.data === 'nexus-tab-focus') loadData();
    });
  </script>
</body>
</html>
