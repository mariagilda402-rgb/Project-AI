<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus · Quiz</title>
  <style>
    @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.02); } }
    #nx-app-wrapper .nx-chrome-inner > header { padding:14px 24px !important; }
    #nx-app-wrapper .nx-chrome-inner > header h1 { font-size:18px !important; font-weight:700 !important; }
    #nx-app-wrapper .nx-chrome-inner > main { padding:20px 24px 40px !important; }

    .setup-card { padding:20px; border-radius:14px; background:var(--bg-panel); border:1px solid var(--border); }
    .setup-card h3 { margin:0 0 16px; font-size:14px; color:var(--text); font-weight:600; }
    .form-field { margin-bottom:12px; }
    .form-field label { display:block; font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; font-weight:600; margin-bottom:5px; }
    #nx-app-wrapper .setup-card select, #nx-app-wrapper .setup-card input { font-size:13px !important; padding:10px 12px !important; }
    .btn-start {
      width:100%; padding:14px; border:none; border-radius:10px;
      background:linear-gradient(135deg,#8b5cf6,#6d28d9); color:#fff;
      font-size:14px; font-weight:700; cursor:pointer; text-transform:uppercase;
      letter-spacing:1px; box-shadow:0 4px 15px rgba(139,92,246,0.3); transition:all 0.2s; margin-top:8px;
    }
    .btn-start:hover { box-shadow:0 6px 25px rgba(139,92,246,0.5); filter:brightness(1.1); }

    .q-card { padding:20px; border-radius:14px; background:var(--bg-panel); border:1px solid var(--border); animation:slideIn 0.3s ease; }
    .q-progress { font-size:11px; color:var(--text-dim); margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
    .q-stem { font-size:15px; color:var(--text); line-height:1.5; margin-bottom:18px; font-weight:500; }
    .q-options { display:flex; flex-direction:column; gap:8px; }
    .opt-btn {
      width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:10px;
      background:transparent; color:var(--text); font-size:13px; cursor:pointer;
      text-align:left; transition:all 0.2s; font-weight:500;
    }
    .opt-btn:hover { border-color:rgba(139,92,246,0.4); background:rgba(139,92,246,0.05); }
    .opt-btn:active { transform:scale(0.98); }

    .result-card { padding:24px; border-radius:14px; background:var(--bg-panel); border:1px solid var(--border); text-align:center; }
    .result-score { font-size:48px; font-weight:900; margin:16px 0; }
    .result-score.good { color:#22c55e; }
    .result-score.bad { color:#ef4444; }
    .result-score.mid { color:#f59e0b; }
    .result-detail { font-size:14px; color:var(--text-dim); margin-bottom:20px; }
    .review-panel {
      margin-top:18px; text-align:left; display:grid; gap:10px;
    }
    .review-head {
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding-top:14px; border-top:1px solid var(--border);
    }
    .review-head strong { color:var(--text); font-size:13px; }
    .review-head span { color:var(--text-dim); font-size:11px; }
    .review-item {
      padding:12px; border-radius:12px; border:1px solid rgba(239,68,68,0.2);
      background:rgba(239,68,68,0.055); display:grid; gap:8px;
    }
    .review-item.ok { border-color:rgba(34,197,94,0.18); background:rgba(34,197,94,0.045); }
    .review-stem { color:var(--text); font-size:12px; line-height:1.45; }
    .review-meta { display:flex; flex-wrap:wrap; gap:6px; }
    .review-pill {
      padding:4px 7px; border-radius:999px; background:rgba(139,92,246,0.12);
      border:1px solid rgba(139,92,246,0.24); color:#a78bfa; font-size:10px; font-weight:800;
      text-transform:uppercase; letter-spacing:0.4px;
    }
    .review-answer { color:var(--text-dim); font-size:11px; line-height:1.4; }
    .review-answer strong { color:var(--text); }
    .review-explanation { color:var(--text); font-size:12px; line-height:1.48; }
    .review-actions { margin:2px 0 0; padding-left:18px; color:var(--text-dim); font-size:12px; display:grid; gap:4px; }
    .review-tools { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:2px; }
    .btn-review-action {
      border:1px solid rgba(34,211,238,0.34); border-radius:10px; padding:9px 12px;
      background:rgba(34,211,238,0.09); color:#67e8f9; font-size:11px; font-weight:800;
      text-transform:uppercase; letter-spacing:0.55px; cursor:pointer; transition:all 0.18s;
    }
    .btn-review-action:hover { border-color:rgba(34,211,238,0.62); background:rgba(34,211,238,0.15); }
    .btn-review-action:disabled { opacity:0.58; cursor:default; }
    .btn-review-now {
      border:1px solid rgba(34,197,94,0.36); border-radius:10px; padding:9px 12px;
      background:rgba(34,197,94,0.1); color:#86efac; font-size:11px; font-weight:800;
      text-transform:uppercase; letter-spacing:0.55px; cursor:pointer; transition:all 0.18s;
    }
    .btn-review-now:hover { border-color:rgba(34,197,94,0.7); background:rgba(34,197,94,0.16); }
    .btn-review-now[hidden] { display:none; }
    .review-status { color:var(--text-dim); font-size:11px; line-height:1.4; min-height:16px; }
    .btn-again { padding:12px 24px; border:none; border-radius:10px; background:linear-gradient(135deg,#8b5cf6,#6d28d9); color:#fff; font-size:13px; font-weight:700; cursor:pointer; text-transform:uppercase; transition:all 0.2s; }
    .btn-again:hover { filter:brightness(1.1); }
  </style>

<body><div id="nx-app-wrapper" class="neon-enabled" data-theme="dark" data-theme-preset="dark-neon" style="--accent: #8b5cf6; --accent-glow: rgba(139,92,246,0.30); --accent-hover: #7c3aed; --accent-subtle: rgba(139,92,246,0.08); --bg: #0a0a0a; --bg-panel: #111111; --border: rgba(255,255,255,0.08); --border-accent: rgba(139,92,246,0.35); --muted: #71717a; --shadow: 0 0 25px rgba(0,0,0,0.80); --sidebar: #080808; --surface: rgba(255,255,255,0.04); --surface-hover: rgba(255,255,255,0.08); --text: #e4e4e7; --text-dim: #71717a; --text-muted: #52525b"><div class="nx-chrome-inner" style="border-radius: 0;">
  <header>
    <div><h1># Quiz</h1><span>Simulados e questões</span></div>
    <button type="button" class="btn btn-ghost" onclick="pywebview.api.jump('overview','{}')">Visão geral</button>
  </header>
  <main>
    <div id="setup" class="setup-card">
      <h3>### Configurar Sessão</h3>
      <div class="form-field">
        <label>Área</label>
        <select id="areaSel">
          <option value="">Todas as áreas</option>
          <option>Matemática</option><option>Português</option>
          <option>Ciências da Natureza</option><option>Ciências Humanas</option>
        </select>
      </div>
      <div class="form-field">
        <label>Modo</label>
        <select id="quizMode">
          <option value="5">Rápido (5 questões)</option>
          <option value="10">Médio (10 questões)</option>
          <option value="30">Completo (30 questões)</option>
        </select>
      </div>
      <button type="button" class="btn-start" id="btnStart">⚡ Começar</button>
    </div>
    <div id="play" style="display:none;"></div>
    <div id="done" style="display:none;"></div>
  </main>
  <script src="nexus_boot.js"></script>
  <script>
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
    let attemptId = null, questions = [], idx = 0, correctCount = 0;
    let timerInterval = null, timerSeconds = 0;

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function showSetup() { document.getElementById('setup').style.display='block'; document.getElementById('play').style.display='none'; document.getElementById('done').style.display='none'; }

    function renderQuestion() {
      const play = document.getElementById('play');
      if (idx >= questions.length) { finishQuiz(); return; }
      const q = questions[idx];
      const opts = q.options || [];
      play.innerHTML =
        '<div class="q-card">' +
          '<div style="display:flex; justify-content:space-between;">' +
            '<div class="q-progress">Questão ' + (idx+1) + ' / ' + questions.length + ' · ' + esc(q.area) + '</div>' +
            '<div id="quizTimer" style="font-size:12px; font-weight:800; color:#fbbf24; font-family:monospace;">' + formatTime(timerSeconds) + '</div>' +
          '</div>' +
          '<div class="q-stem">' + esc(q.stem) + '</div>' +
          '<div class="q-options">' + opts.map((o,i) => '<button type="button" class="opt-btn" data-i="' + i + '">' + esc(o) + '</button>').join('') + '</div>' +
        '</div>';
      play.querySelectorAll('.opt-btn').forEach(b => { b.onclick = () => onPick(parseInt(b.dataset.i)); });
    }

    function renderReview(review) {
      if (!review) return '<div id="reviewPanel" class="review-panel"><div class="review-head"><strong>Revisão</strong><span>Sem dados.</span></div></div>';
      const wrong = (review.items || []).filter(item => !item.correct);
      const focus = wrong.length ? wrong : (review.items || []).slice(0, 3);
      const actions = (review.next_actions || []).map(a => '<li>' + esc(a) + '</li>').join('');
      const canCreate = (review.wrong_count || 0) > 0;
      const items = focus.map(item => (
        '<div class="review-item' + (item.correct ? ' ok' : '') + '">' +
          '<div class="review-meta">' +
            '<span class="review-pill">' + esc(item.area || 'Geral') + '</span>' +
            '<span class="review-pill">' + esc(item.skill || 'skill') + '</span>' +
            '<span class="review-pill">' + esc(item.difficulty || 'media') + '</span>' +
          '</div>' +
          '<div class="review-stem">' + esc(item.stem || '') + '</div>' +
          '<div class="review-answer"><strong>Sua resposta:</strong> ' + esc(item.chosen_option || '-') + '</div>' +
          '<div class="review-answer"><strong>Correta:</strong> ' + esc(item.correct_option || '-') + '</div>' +
          '<div class="review-explanation">' + esc(item.explanation || '') + '</div>' +
        '</div>'
      )).join('');
      return (
        '<div id="reviewPanel" class="review-panel">' +
          '<div class="review-head"><strong>Revisão guiada</strong><span>' + (review.wrong_count || 0) + ' erro(s)</span></div>' +
          (actions ? '<ul class="review-actions">' + actions + '</ul>' : '') +
          '<div class="review-tools">' +
            '<button type="button" class="btn-review-action" id="btnQuizFlashcards"' + (canCreate ? '' : ' disabled') + '>Criar flashcards dos erros</button>' +
            '<button type="button" class="btn-review-now" id="btnReviewNow" hidden>Revisar agora</button>' +
            '<span id="reviewStatus" class="review-status">' + (canCreate ? 'Pronto para memorizar os pontos fracos.' : 'Sem erros para converter em flashcards.') + '</span>' +
          '</div>' +
          items +
        '</div>'
      );
    }

    function openFlashcardReview(result) {
      const created = Number((result && result.created) || 0);
      const payload = {
        animate: 'quiz_flashcards_generate',
        created: created,
        toast: created > 0
          ? created + ' flashcard(s) dos erros prontos para revisar.'
          : 'Flashcards dos erros ja estavam na fila de revisao.'
      };
      if (window.pywebview && pywebview.api && pywebview.api.jump) {
        pywebview.api.jump('study', JSON.stringify(payload));
      }
    }

    function bindReviewActions(review) {
      const btn = document.getElementById('btnQuizFlashcards');
      const reviewNow = document.getElementById('btnReviewNow');
      const status = document.getElementById('reviewStatus');
      if (!btn || !status || !review || !(review.wrong_count > 0)) return;
      btn.onclick = async () => {
        btn.disabled = true;
        status.textContent = 'Criando flashcards dos erros...';
        const r = await nxBridge('quiz_flashcards_generate', { attempt_id: review.attempt_id || attemptId, only_wrong: true, max_cards: 8 });
        if (!r.ok) {
          btn.disabled = false;
          status.textContent = r.error || 'Erro ao criar flashcards.';
          return;
        }
        const created = (r.data && r.data.created) || 0;
        if (reviewNow) {
          reviewNow.hidden = false;
          reviewNow.disabled = false;
          reviewNow.textContent = created > 0 ? 'Revisar agora' : 'Abrir Flashcards';
          reviewNow.onclick = () => openFlashcardReview(r.data || { created });
        }
        if (created > 0) {
          btn.textContent = 'Flashcards criados';
          status.textContent = created + ' flashcard(s) prontos para revisao espacada.';
        } else {
          status.textContent = 'Os flashcards desses erros ja estavam prontos.';
        }
      };
    }

    function onPick(chosen) {
      const q = questions[idx];
      const ok = chosen === q.correct_index;
      if (ok) correctCount++;
      nxBridge('quiz_attempt_answer', { attempt_id: attemptId, question_id: q.id, chosen_index: chosen, correct: ok ? 1 : 0 });
      nxBridge('study_log_result', { subject: q.area || 'Geral', correct: ok });
      idx++;
      renderQuestion();
    }

    async function finishQuiz() {
      if (timerInterval) clearInterval(timerInterval);
      document.getElementById('play').style.display = 'none';
      const total = questions.length || 1;
      const pct = Math.round((100 * correctCount) / total);
      await nxBridge('quiz_attempt_finish', { attempt_id: attemptId, score_pct: pct });
      const reviewResult = await nxBridge('quiz_attempt_review', { attempt_id: attemptId });
      const review = reviewResult.ok ? reviewResult.data : null;
      const cls = pct >= 70 ? 'good' : pct >= 40 ? 'mid' : 'bad';
      const d = document.getElementById('done');

      let breakdownHtml = '';
      if (review && review.breakdown) {
        breakdownHtml = '<div id="quizBreakdown" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0; text-align:left;">' +
          Object.entries(review.breakdown).map(([area, info]) => (
            '<div style="padding:10px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid var(--border);">' +
              '<div style="font-size:10px; color:var(--text-dim); text-transform:uppercase;">' + esc(area) + '</div>' +
              '<div style="font-size:14px; font-weight:700; color:' + (info.pct >= 70 ? '#22c55e' : info.pct >= 40 ? '#f59e0b' : '#ef4444') + ';">' + info.pct + '% (' + info.correct + '/' + info.total + ')</div>' +
            '</div>'
          )).join('') + '</div>';
      }

      d.style.display = 'block';
      d.innerHTML =
        '<div class="result-card">' +
          '<h2 style="margin:0;font-size:16px;color:var(--text);">## Resultado</h2>' +
          '<div class="result-score ' + cls + '">' + pct + '%</div>' +
          '<div class="result-detail">Acertos: <strong>' + correctCount + '</strong> de <strong>' + questions.length + '</strong> &bull; Tempo: <strong>' + formatTime(timerSeconds) + '</strong></div>' +
          breakdownHtml +
          renderReview(review) +
          '<button type="button" class="btn-again" id="btnAgain">Nova Sessão</button>' +
        '</div>';
      bindReviewActions(review);
      document.getElementById('btnAgain').onclick = () => { attemptId=null; questions=[]; idx=0; correctCount=0; timerSeconds=0; showSetup(); };
    }

    document.getElementById('btnStart').onclick = async () => {
      const area = document.getElementById('areaSel').value.trim() || null;
      const n = parseInt(document.getElementById('quizMode').value, 10) || 5;
      const st = await nxBridge('quiz_attempt_start', { area });
      if (!st.ok) { alert(st.error || 'Erro'); return; }
      attemptId = st.data && st.data.attempt_id;
      const qs = await nxBridge('quiz_sample', { n, area });
      if (!qs.ok) { alert(qs.error || 'Erro'); return; }
      questions = qs.data || [];
      if (!questions.length) { alert('Sem questões. Execute o seed ou escolha outra área.'); return; }
      idx = 0; correctCount = 0; timerSeconds = 0;
      document.getElementById('setup').style.display = 'none';
      document.getElementById('done').style.display = 'none';
      document.getElementById('play').style.display = 'block';
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timerSeconds++;
        const tEl = document.getElementById('quizTimer');
        if (tEl) tEl.textContent = formatTime(timerSeconds);
      }, 1000);
      renderQuestion();
    };
  </script>
</div></div></body>
